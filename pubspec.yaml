name: wra5
description: A simple Flutter app with Whalyze features
publish_to: 'none'
version: 1.0.3+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  heroicons: ^0.11.0
  file_picker: ^8.0.0+1
  receive_sharing_intent: ^1.8.1
  google_fonts: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.2
  flutter_archive: ^6.0.4
  url_launcher: ^6.2.0
  video_player: ^2.9.5
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/icono3.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/sample.mp4

